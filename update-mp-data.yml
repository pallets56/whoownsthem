name: Update MP Data

on:
  schedule:
    # Every Monday at 6am UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python3 scrape_interests_nopip.py

      - name: Commit updated mpdata.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mpdata.js
          git diff --staged --quiet || git commit -m "Update MP data - $(date +%Y-%m-%d)"
          git push
